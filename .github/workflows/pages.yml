name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Restore rendered TikZ diagrams
        uses: actions/cache@v4
        with:
          path: .jekyll-cache/tikzcd
          key: tikzcd-${{ runner.os }}-${{ hashFiles('_plugins/tikzcd_renderer.rb', '_posts/**/*.md', '*.md') }}
          restore-keys: |
            tikzcd-${{ runner.os }}-

      - name: Try Jekyll build with cached TikZ diagrams
        id: cached-build
        run: |
          if bundle exec jekyll build; then
            echo "cache-complete=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache-complete=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          JEKYLL_ENV: production

      - name: Install TikZ renderer
        if: steps.cached-build.outputs.cache-complete != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            dvisvgm \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-pictures

      - name: Build with Jekyll
        if: steps.cached-build.outputs.cache-complete != 'true'
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
