<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      enableMenu: false 
    },
    svg: {
      fontCache: 'global',
      scale: 0.89,
      exFactor: 0.5,
      displayAlign: 'center'
    }
  };
  </script>

  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-svg.js"></script>

  <style>
    .MathJax svg {
    vertical-align: middle !important;
    margin-bottom: 0.1ex !important;
    }
  </style>

   {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <style>
    hr { border: 1px !important;}

    .page-header {
      background-color: {{ site.banner_color_start | default: "#000000" }} !important;
      background-image: linear-gradient(to bottom, 
        {{ site.banner_color_start | default: "#000000" }}, 
        {{ site.banner_color_end | default: "#ffffff" }}
      ) !important;
      padding: 5rem 6rem !important;
      text-align: center;
    }

    .project-name, .project-tagline {
      color: #ffffffd7 !important;
    }

    .project-name { font-size: 2.6rem !important; margin-top: 0.8rem !important;}
    .project-tagline { font-size: 1.1rem !important; margin-top: 0.8rem !important;}

    .main-content {
      max-width: 57.5rem !important;
      margin: 0 auto;
      padding: 2rem 4rem;
      font-size: 1.05rem !important;
    }
    h1 { font-size: 2.0rem !important; margin-bottom: 0rem; margin-top: 5rem !important;}
    h2 { font-size: 1.2rem !important; margin-bottom: 0rem; margin-top: 3rem !important;}
    h3 { font-size: 1.1rem !important; margin-bottom: 0rem; }

    .page-header .btn {
      color: #ffffffa2 !important;
      border-color: rgba(255, 255, 255, 0.258) !important;
      background-color: rgba(255, 255, 255, 0.1) !important;
      transition: all 0.2s ease;
      padding: 0.6rem 0.9rem !important;
      font-size: 0.85rem !important;
    }

    .page-header .btn:hover {
      background-color: rgba(255, 255, 255, 0.2) !important;
      border-color: rgba(255, 255, 255, 0.6) !important;
    }

    .header-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    @media screen and (max-width: 1024px) {
      html {
        font-size: 16px !important;
      }

      .main-content {
        font-size: 1rem !important;
        line-height: 1.55 !important;
        padding: 1.5rem 2.5rem !important;
      }
    }

    @media (max-width: 767px) {
      .main-content {
        padding: 1.5rem 1rem !important;
      }
    }

  </style>

  <style>
    html {
      background-color: white !important; 
    }
    
    body {
      opacity: 0;
      transition: opacity 0.2s ease-in; 
    }

    body.loaded {
      opacity: 1 !important;
    }
  </style>

  <script>
    window.addEventListener('DOMContentLoaded', (event) => {
      document.body.classList.add('loaded');
    });
  </script>
</head>

<body>

  <section class="page-header">
    <h1 class="project-name">{{ site.fixed_banner_title | default: site.title }}</h1>
    <h2 class="project-tagline">{{ site.description }}</h2>
    <div class="header-buttons">
     <a href="{{ site.github.repository_url }}" class="btn">View on GitHub</a>
     <a href="{{ '/feed.xml' | relative_url }}" class="btn">RSS Feed</a>
    </div>
    <div id="busuanzi_container_site" style="display:none; margin-top: 15px; font-size: 0.85rem; color: rgba(255,255,255,0.7);">
      <span>Total Views: </span>
      <span id="busuanzi_value_site_pv" style="font-weight: bold;"></span>
      <span style="margin: 0 8px; opacity: 0.5;">|</span>
      <span>Visitors: </span>
      <span id="busuanzi_value_site_uv" style="font-weight: bold;"></span>
    </div>

    <script>
      var checkBusuanzi = setInterval(function() {
        var pv = document.getElementById('busuanzi_value_site_pv');
        if (pv && pv.innerText !== "") {
          document.getElementById('busuanzi_container_site').style.display = 'block';
          clearInterval(checkBusuanzi);
        }
      }, 500); 
    </script>
  </section>

  <main id="content" class="main-content" role="main">
    {{ content }}

    <footer class="site-footer">
      <p>&copy; {{ "now" | date: "%Y" }} {{ site.github.owner_name | default: "YeonsolKim" }}. All rights reserved.</p>
    </footer>
  </main>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
                  "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic",
                  "Helvetica Neue", Arial, sans-serif;
    }

    .site-footer { 
      color: #575757c2 !important; 
      font-size: 0.9rem !important;
      border-top: #ffffff00 !important;
    }

    blockquote {
      background-color: #a4a4a422 !important; 
      color: #333 !important;            
      margin: 1.5rem 0 !important;
      margin: 1.5rem 0 !important;
      padding: 1rem 1.5rem !important;
      border-radius: 10px !important; 
      overflow: hidden; 
      border-left: #28569200 !important;
    }

    blockquote mjx-container {
      color: inherit !important;
    }

    table {
      width: 100% !important;
      display: table !important;
      border-collapse: separate !important;
      border-spacing: 0 !important;
      margin-left: auto !important;
      margin-right: auto !important;
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
      border: 0.5px solid #00000010 !important;
      border-radius: 15px !important;
      overflow: hidden !important;
      table-layout: auto !important; 
    }

    thead, tbody, tr {
      width: 100% !important;
    }

    th, td {
      padding: 6px 7px !important; 
      white-space: nowrap !important;
      border-bottom: 0.5px solid #00000010 !important;
      border-right: 0.5px solid #00000010 !important;
      font-size: 1rem;
      text-align: left;
    }

    tbody { background-color: #bdbdbd0d; }
    thead th {
    background-color: #bdbdbd32;
    }
  </style>
</body>
</html>
