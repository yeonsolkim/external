<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      enableMenu: false 
    },
    svg: {
      fontCache: 'global',
      scale: 0.89,
      exFactor: 0.5,
      displayAlign: 'center'
    }
  };
  </script>

  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-svg.js"></script>

  <style>
    .MathJax svg {
    vertical-align: middle !important;
    margin-bottom: 0.1ex !important;
    }
  </style>

   {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <style>
    hr { border: 1px !important;}

    .page-header {
      background-image: linear-gradient(to bottom, 
        {{ site.banner_color_start | default: "#000000" }}, 
        {{ site.banner_color_end | default: "#ffffff" }}
      ) !important;
      min-height: 0 !important;
      padding: 0.8rem 1rem;
      justify-content: center !important;
      align-items: center !important;
      display: flex;
    }

    .header-title-row {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      width: 85% !important;
    }

    .project-name, .project-tagline {
      color: #1e1e1e !important;
      margin-right: 2rem;
      text-align: left !important;
      font-weight: lighter;
    }

    .project-name { font-size: 1.5rem !important; }
    .project-tagline { font-size: 1rem !important; }

    .main-content {
      max-width: 57.5rem !important;
      margin: 0 auto;
      padding: 2rem 4rem;
      font-size: 1.05rem !important;
    }
    .main-content h1 { font-size: 2.0rem !important; }
    .main-content h2 { font-size: 1.2rem !important; }
    .main-content h3 { font-size: 1.1rem !important; margin-bottom: 0rem; }
    

    @media screen and (max-width: 1024px) {
      html {
        font-size: 16px !important;
      }

      .main-content {
        font-size: 1rem !important;
        line-height: 1.55 !important;
        padding: 1.5rem 4rem !important;
      }

      .header-title-row {
        width: 100% !important;
    }
    }

    @media (max-width: 767px) {
      .main-content {
        padding: 1.5rem 1rem !important;
      }
    }

  </style>

  <style>
    html {
      background-color: white !important; 
    }
    
    body {
      opacity: 0;
      transition: opacity 0.2s ease-in; 
    }

    body.loaded {
      opacity: 1 !important;
    }
  </style>

  <script>
    window.addEventListener('DOMContentLoaded', (event) => {
      document.body.classList.add('loaded');
    });
  </script>
</head>

<body>

  <section class="page-header">
    <div class="header-title-row">
      <h1 class="project-name">{{ site.fixed_banner_title | default: site.title }}</h1>
        <div class="header-links">
          <a href="{{ site.baseurl }}/">Home</a>
          <a href="{{ site.github_url }}">Go to GitHub</a><br>
          <a href="{{ '/feed.xml' | relative_url }}">RSS Feed</a>
        </div>
    </div>
  </section>

  <main id="content" class="main-content" role="main">
    {{ content }}

    <footer class="site-footer">
      <p>&copy; {{ "now" | date: "%Y" }} {{ site.github.owner_name | default: "YeonsolKim" }}. All rights reserved.</p>
    </footer>
  </main>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
                  "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic",
                  "Helvetica Neue", Arial, sans-serif;
    }
    .header-links a  { text-decoration: underline; color: #61616190; font-size: 0.9rem; font-weight: 350; margin-right: 0;}

    .header-links { text-align: center; display: flex; gap: 1.5rem; justify-content: right; margin-left: auto;}

    .site-footer { 
      color: #575757c2 !important; 
      font-size: 0.9rem !important;
      border-top: #ffffff00 !important;
    }

    blockquote {
      background-color: #a4a4a422 !important; 
      color: #333 !important;            
      margin: 1.5rem 0 !important;
      margin: 1.5rem 0 !important;
      padding: 1rem 1.5rem !important;
      border-radius: 10px !important; 
      overflow: hidden; 
      border-left: #28569200 !important;
    }

    blockquote mjx-container {
      color: inherit !important;
    }

    table {
      width: 100% !important;
      display: table !important;
      border-spacing: 0 !important;
      margin-left: auto !important;
      margin-right: auto !important;
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #dfdfdf !important;
      border-radius: 15px !important;
      overflow: hidden !important;
      table-layout: auto !important; 
    }

    thead, tbody, tr {
      width: 100% !important;
    }

    th, td {
      padding: 5px 13px !important; 
      white-space: nowrap !important;
      font-size: 1rem;
      text-align: left;
      border-bottom: 0.4px #c4c4c4 !important;
      border-right: 0.4px #c4c4c4 !important;
    }

    tbody { background-color: #f6f6f678; }
    thead th {
    background-color: #a4a4a422;
    }
  </style>
</body>
</html>
