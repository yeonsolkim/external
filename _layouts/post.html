---
layout: default
title: Abstraction
---

<article class="main-content">

  <nav style="margin-bottom: 27px;">
    <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #666; font-size: 0.9rem; font-weight: 350;">← Back</a>
  </nav>


  <header style="text-align: center;">
    <h1 style="margin-top: 0 !important; margin-bottom: 1.6rem; color:#000000cc">{{ page.title }}</h1>
    <div style="display: flex; align-items: center; justify-content: center;">
    <img src="https://github.com/yeonsolkim.png" alt="yeonsolkim" 
         style="width: 35px; height: 35px; border-radius: 50%;">
    </div>
    <span style="font-weight:300; color: #4c4c4c; font-size: 1rem;">Yeonsol Kim</span>
    <p style="color: #666; margin-top: 0; margin-bottom: 36px; font-weight: lighter; font-size: 0.8rem; ">{{ page.date | date: "%B %d, %Y" }}</p>
  </header>

  <hr style="margin-bottom: 25px;">

  <div class="post-body">
    {{ content }}
  </div>

  <hr style="margin-top: 50px;">

  <div id="comment-section">
    <script src="https://giscus.app/client.js"
        data-repo="yeonsolkim/blog"
        data-repo-id="R_kgDOR8ku5Q"
        data-category="Announcements"
        data-category-id="DIC_kwDOR8ku5c4C6V6d"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="en"
        crossorigin="anonymous"
        async>
    </script>
  </div>
</article>

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  .main-content a:hover { text-decoration: underline !important; }
  .main-content {
    width: 100% !important;
    box-sizing: border-box !important;
    max-width: 65rem !important; 
    padding: 2rem 4rem;
    margin: 0 auto;
    word-wrap: break-word;
    line-height: 1.6;
    color: #333;
  }
  .post-body h1, 
  .post-body h2, 
  .post-body h3, 
  .post-body h4, 
  .post-body h5, 
  .post-body h6 {
    color: #333 !important; 
    font-weight: bold;
    margin-top: 2.5rem;
    margin-bottom: 0 rem;
  }

  .post-body h1:first-child, 
  .post-body h2:first-child, 
  .post-body h3:first-child { 
    margin-top: 0 !important;
  }

  .post-body h2 + h3 {
    margin-top: 0 !important;
  }

  .post-body hr + h2 {
    margin-top: 1.5rem !important;
  }

  .post-body hr {
    margin-top: 3.5rem !important;
  }

  .post-body ul {
    list-style-type: disc !important; 
    padding-left: 2rem;
    margin-top: -0.5rem !important;
  }
  
  .post-body ul li::marker {
    color: #00000081; 
    font-size: 0.85em;
  }
  
  .post-body ul li p {
    margin-top: 0 !important;
    margin-bottom: 0 !important;
    display: inline; 
  }
 

  .post-body ul li {
    line-height: 1.6;
  }

  .post-body ul ul, 
  .post-body ul ol {
    margin-top: 0 !important;
    margin-bottom: 0 !important;
  }

  .post-body img, .post-body canvas, .post-body svg {
    max-width: 100%;
  }

 @media screen and (max-width: 600px) {
  .main-content {
    padding: 1.5rem;
   }
  }
</style>

<style>
  ol {
    list-style: none;
    margin-top: -0.5rem !important;
    counter-reset: line-counter;
    padding-left: 2rem;
  }

  ol > li {
    counter-increment: line-counter;
    position: relative;
  }

  ol > li::before {
    content: counter(line-counter) ".";
    position: absolute;
    font-weight:normal;
    left: -1.2rem;
  }

  ol ul {
    list-style: disc; 
    padding-left: 0rem;
    margin-bottom: 0px !important;
  }

  ol ul li {
    position: static; 
  }

  ol ul li::before {
    content: none; 
  }

  .site-footer {
    max-width: 784px;   
    margin: 0 auto;     
  }
  
</style>
